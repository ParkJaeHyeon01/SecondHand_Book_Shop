<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>개인 거래 정산</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #f9f9f9;
    }
    h1 {
      color: #0091da;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #f0f0f0;
    }
    tr:hover {
      background-color: #e8f4ff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>개인 거래 정산 내역</h1>
  <table>
    <thead>
      <tr>
        <th>정산 ID</th>
        <th>판매자</th>
        <th>금액</th>
        <th>정산 상태</th>
        <th>날짜</th>
      </tr>
    </thead>
    <tbody id="payment-tbody">
      <!-- 항목이 여기에 채워짐 -->
    </tbody>
  </table>

  <script>
    async function fetchPersonalSettlements() {
      const token = localStorage.getItem('jwtToken');
      if (!token) {
        alert('로그인이 필요합니다.');
        window.location.href = './adminLogin.html';
        return;
      }

      try {
        const res = await fetch('https://www.shbshop.store/admin/check-payment/pt', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        const data = await res.json();
        console.log('받은 데이터:', data);

        const tbody = document.getElementById('payment-tbody');
        data.payment_group.forEach(item => {
          const row = document.createElement('tr');
          row.addEventListener('click', () => {
            // 상세 페이지로 이동 (쿼리로 전달)
            window.location.href = `./personal-settlement-detail.html?kind=1&idx=${item.pyid}`;
          });

          row.innerHTML = `
            <td>${item.pyid}</td>
            <td>${item.name} (${item.email})</td>
            <td>${item.price.toLocaleString()}원</td>
                        <td>${
            item.state === 10
                ? '정산 진행 중'
                : item.state === 11
                ? '정산 완료'
                : item.reason ?? 'N/A'
            }</td>

            <td>${new Date(item.createAt).toLocaleDateString()}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error('에러:', err);
        alert('데이터를 불러오는 데 실패했습니다.');
      }
    }

    fetchPersonalSettlements();
  </script>
</body>
</html>
