<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>사업자 상세 정보</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .detail-container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      width: 80%;
      margin-top: 30px;
    }
    .detail-container h2 {
      text-align: center;
      color: #333;
    }
    .detail-info {
      margin-bottom: 20px;
      font-size: 16px;
    }
    canvas {
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
      margin-top: 10px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div class="detail-container">
    <h2>사업자 상세 정보</h2>
    <div id="licenceDetails" class="detail-info"></div>

    <!-- 사업자 등록증 -->
    <div id="licencePdfContainer" style="margin-top: 30px; text-align: center;">
      <p style="font-weight: bold; margin-bottom: 10px;">사업자 등록증</p>
      <div id="pdfViewer" style="border: 1px solid #ddd;"></div>
    </div>

    <!-- 통장 사본 -->
    <div id="bankImageContainer" style="margin-top: 30px; text-align: center;"></div>

    <!-- 승인/거절 영역 -->
    <div style="margin-top: 20px; text-align: center;">
      <textarea id="reviewReason" placeholder="사유를 입력하세요" rows="3"
        style="width: 80%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; display: none;"></textarea>
      <br /><br />
      <button id="approveBtn" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin-right: 10px; cursor: pointer; display: none;">
        승인
      </button>
      <button id="rejectBtn" style="background-color: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; display: none;">
        거절
      </button>
    </div>
  </div>

  <script>
    async function loadLicenceDetails() {
      const token = localStorage.getItem('jwtToken');
      const licenceDetailsDiv = document.getElementById('licenceDetails');
      const reviewBox = document.getElementById('reviewReason');
      const approveBtn = document.getElementById('approveBtn');
      const rejectBtn = document.getElementById('rejectBtn');

      if (!token) {
        alert('로그인 정보가 없습니다. 로그인 페이지로 이동합니다.');
        window.location.href = './adminLogin';
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const licenceId = urlParams.get('licenceId');

      if (!licenceId) {
        alert('라이센스 ID가 없습니다.');
        window.location.href = './admin.html';
        return;
      }

      try {
        const response = await fetch(`https://www.shbshop.store/admin/check-licence/${licenceId}`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error('라이센스 상세 정보를 불러오는 데 실패했습니다.');
        }

        const data = await response.json();
        const state = data.licenceInfo.state;
        const reason = data.licenceInfo.reason || '';

        let statusHtml = '';
        if (state === 1) {
          statusHtml = `<p><strong style="font-weight: bold; color: black;">등록 상태: 심사 중</strong></p>`;
        } else if (state === 2) {
          statusHtml = `<p><strong style="font-weight: bold; color: blue;">등록 상태: 승인 완료</strong></p>`;
        } else if (state === 3) {
          statusHtml = `<p><strong style="font-weight: bold; color: red;">등록 상태: 거절</strong></p>`;
        }

        const licenceDetails = `
          ${statusHtml}
          <p><strong>사업자 명 : </strong> ${data.licenceInfo.businessmanName}</p>
          <p><strong>사업자 이메일 : </strong> ${data.licenceInfo.businessEmail}</p>
          <p><strong>사업자 주소 : </strong> ${data.licenceInfo.address}</p>
          <p><strong>사업자 번호 : </strong> ${data.licenceInfo.coNumber}</p>
          <p><strong>승인 요청일 : </strong> ${new Date(data.licenceInfo.createAt).toLocaleDateString()}</p>
          <p><strong>전화번호 : </strong> ${data.licenceInfo.tel}</p>
          <p><strong>은행명 : </strong> ${data.licenceInfo.bankname}</p>
          <p><strong>계좌번호 : </strong> ${data.licenceInfo.bankaccount}</p>
        `;
        licenceDetailsDiv.innerHTML = licenceDetails;

        if (state === 1) {
          reviewBox.style.display = 'block';
          reviewBox.value = '';
          reviewBox.disabled = false;
          approveBtn.style.display = 'inline-block';
          rejectBtn.style.display = 'inline-block';
        } else if (state === 2) {
          reviewBox.style.display = 'none';
          approveBtn.style.display = 'none';
          rejectBtn.style.display = 'none';
        } else if (state === 3) {
          reviewBox.style.display = 'block';
          reviewBox.value = reason;
          reviewBox.disabled = true;
          approveBtn.style.display = 'none';
          rejectBtn.style.display = 'none';
        }

        // 사업자 등록증 렌더링
        if (data.licenceInfo.licence) {
          const pdfUrl = `https://www.shbshop.store${data.licenceInfo.licence}`;
          renderPDF(pdfUrl);
        }

        

        // 통장 사본 이미지 렌더링
        if (data.licenceInfo.accountPhoto) {
          const imageUrl = `https://www.shbshop.store${data.licenceInfo.accountPhoto}`;
          const bankImageContainer = document.getElementById('bankImageContainer');

          const title = document.createElement('p');
          title.textContent = '통장 사본';
          title.style.fontWeight = 'bold';
          title.style.marginBottom = '10px';

          const img = document.createElement('img');
          img.src = imageUrl;
          img.alt = '통장 사본 이미지';
          img.style.maxWidth = '400px';
          img.style.border = '1px solid #ccc';
          img.style.borderRadius = '8px';
          img.style.boxShadow = '0px 2px 10px rgba(0,0,0,0.1)';

          bankImageContainer.appendChild(title);
          bankImageContainer.appendChild(img);
        }

      } catch (error) {
        console.error('에러:', error);
        alert('라이센스 상세 정보를 불러올 수 없습니다.');
      }
    }

    function renderPDF(pdfUrl) {
      const pdfViewerDiv = document.getElementById('pdfViewer');
      pdfViewerDiv.innerHTML = ''; // 기존 내용 제거

      pdfjsLib.getDocument(pdfUrl).promise.then(pdfDoc => {
        pdfDoc.getPage(1).then(page => {
          const scale = 0.7;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement('canvas');
          pdfViewerDiv.appendChild(canvas);
          const ctx = canvas.getContext('2d');

          canvas.height = viewport.height;
          canvas.width = viewport.width;

          page.render({
            canvasContext: ctx,
            viewport: viewport
          });
        });
      }).catch(error => {
        console.error('PDF 렌더링 실패:', error);
        alert('PDF를 불러오는 데 실패했습니다.');
      });
    }

    async function sendReview(decisionValue) {
      const token = localStorage.getItem('jwtToken');
      const urlParams = new URLSearchParams(window.location.search);
      const licenceId = urlParams.get('licenceId');
      const reason = document.getElementById('reviewReason').value.trim();

      if (!licenceId || !token) {
        alert('유효하지 않은 접근입니다.');
        return;
      }

      if (!reason) {
        alert('사유를 입력해주세요.');
        return;
      }

      try {
        const response = await fetch(`https://www.shbshop.store/admin/check-licence/${licenceId}/review`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            decision: decisionValue,
            reason: reason
          })
        });

        if (!response.ok) {
          throw new Error('서버 응답 실패');
        }

        const result = await response.json();
        alert(`라이센스 ${decisionValue === 2 ? '승인' : '거절'} 처리되었습니다.`);
        window.location.href = './admin.html';
      } catch (err) {
        console.error(err);
        alert('처리에 실패했습니다.');
      }
    }

    document.getElementById('approveBtn').addEventListener('click', () => sendReview(2));
    document.getElementById('rejectBtn').addEventListener('click', () => sendReview(3));

    loadLicenceDetails();
  </script>
</body>
</html>
