<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 로그인</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    .login-container h2 {
      text-align: center;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input[type="email"],
    input[type="password"] {
      width: 93%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0091da;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #007cb8;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>관리자 로그인</h2>
    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="이메일" required />
      </div>
      <div class="form-group">
        <input type="password" id="password" name="password" placeholder="비밀번호" required />
      </div>
      <input type="hidden" name="kind" value="3" />
      <button type="submit">로그인</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
      event.preventDefault(); // 폼 제출 기본 동작 방지

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const kind = 3; // 관리자 로그인

      const loginData = {
        email: email,
        password: password,
        kind: kind
      };

      try {

        const response = await axios.post('https://www.shbshop.store/auth/login', loginData, {
          headers: {
            'Content-Type': 'application/json'
          }
        });

     
        localStorage.setItem('jwtToken', response.data.token);

    
        window.location.href = './admin-menu.html'; 
      } catch (error) {
     
        console.error('로그인 실패:', error.response ? error.response.data.error : error.message);
        alert('로그인 실패: ' + (error.response ? error.response.data.error : error.message));
      }
    });
  </script>
</body>
</html>
